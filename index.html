<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>像素拼豆生成器</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🎨 像素拼豆生成器</h1>
        <p>上传图片，AI 转换为像素拼豆风格，一次输出 4 种像素密度</p>
      </header>

      <main>
        <!-- 上传区 -->
        <div class="upload-section">
          <div class="panel upload-panel">
            <h2>原始图片</h2>
            <div id="dropzone" class="dropzone">
              <div class="dropzone-inner" id="dropzone-inner">
                <div class="upload-icon">📁</div>
                <p class="upload-hint">点击或拖拽图片到此处</p>
                <p class="upload-sub">支持 JPG、PNG、SVG 格式</p>
              </div>
              <img id="preview-img" class="preview-img hidden" alt="原始图片" />
            </div>
            <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.svg,image/svg+xml" hidden />

            <div class="btn-row">
              <button id="generate-btn" disabled>
                <span id="btn-text">生成拼豆图</span>
                <span id="btn-spinner" class="spinner hidden"></span>
              </button>
              <button id="small-mode-btn" class="btn-small-mode" title="限制像素点 ≤ 100，适合快速打印">
                🐣 小鼻嘎模式
              </button>
            </div>
          </div>
        </div>

        <!-- 进度 -->
        <div id="progress-wrap" class="progress-wrap hidden">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span id="progress-text">等待处理…</span>
        </div>

        <!-- 4 张结果 -->
        <div id="results-grid" class="results-grid hidden">
          <!-- 动态生成 -->
        </div>

        <!-- 像素分析结果 -->
        <div id="gemini-section" class="gemini-section hidden">
          <div class="gemini-header">
            <span class="gemini-title">像素分析</span>
            <span id="pixel-info" class="pixel-info"></span>
          </div>
          <p id="gemini-status" class="gemini-status"></p>
          <canvas id="pixel-canvas" class="pixel-canvas hidden"></canvas>
        </div>

        <!-- 3D 模型生成区 -->
        <div id="model3d-section" class="model3d-section hidden">
          <div class="model3d-header">
            <span class="model3d-title">3D 模型生成</span>
            <span id="model3d-info" class="model3d-info"></span>
          </div>

          <!-- 参数面板 -->
          <div class="model3d-params">
            <div class="mp-row">
              <label>零件高度</label>
              <input type="range"  id="mp-height-r" min="10" max="80"     step="0.5"  value="37.625">
              <input type="number" id="mp-height-v" min="10" max="80"     step="0.5"  value="37.625" class="mp-val">
              <span class="mp-unit">mm</span>
            </div>
            <div class="mp-row">
              <label>插宽度</label>
              <input type="range"  id="mp-plugw-r"  min="1"  max="6"      step="0.05" value="4.263">
              <input type="number" id="mp-plugw-v"  min="1"  max="6"      step="0.05" value="4.263" class="mp-val">
              <span class="mp-unit">mm</span>
            </div>
            <div class="mp-row">
              <label>头部倍率</label>
              <input type="range"  id="mp-head-r"   min="0.3" max="3"     step="0.05" value="1">
              <input type="number" id="mp-head-v"   min="0.3" max="3"     step="0.05" value="1"     class="mp-val">
              <span class="mp-unit">×</span>
            </div>
            <div class="mp-row">
              <label>插高度</label>
              <input type="range"  id="mp-plugh-r"  min="1"  max="37.625" step="0.1"  value="6.1">
              <input type="number" id="mp-plugh-v"  min="1"  max="37.625" step="0.1"  value="6.1"   class="mp-val">
              <span class="mp-unit">mm</span>
            </div>
            <div class="mp-row">
              <label>表面厚度</label>
              <input type="range"  id="mp-surf-r"   min="0"  max="5"      step="0.1"  value="0.8">
              <input type="number" id="mp-surf-v"   min="0"  max="5"      step="0.1"  value="0.8"   class="mp-val">
              <span class="mp-unit">mm</span>
            </div>
          </div>

          <p id="model3d-status" class="model3d-status"></p>
          <div id="model3d-progress" class="progress-wrap hidden">
            <div class="progress-track">
              <div class="progress-fill" id="model3d-progress-fill"></div>
            </div>
            <span id="model3d-progress-text">生成中…</span>
          </div>
          <canvas id="viewer-canvas" class="viewer-canvas hidden"></canvas>
          <div id="model3d-actions" class="model3d-actions hidden">
            <button id="export-merged-btn" class="btn-export">⬇ 导出合并 STL</button>
            <button id="export-parts-btn"  class="btn-export btn-export-parts">⬇ 导出各零件 STL</button>
            <button id="export-3mf-btn"    class="btn-export btn-export-3mf">🎨 导出彩色 3MF</button>
          </div>
        </div>

        <div id="status-bar" class="status-bar hidden"></div>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
